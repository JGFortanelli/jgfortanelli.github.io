<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24h Time Calc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Time Calc">
    
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --input-border: #48484a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
        }
        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 600; font-size: 22px; margin-bottom: 24px;}
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; opacity: 0.8; }
        
        /* Styled for quick manual typing */
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 22px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .result-box {
            margin-top: 28px;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid var(--input-border);
        }
        .result-title { font-size: 13px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .result-value { font-size: 32px; font-weight: 700; color: var(--accent-color); }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>24-Hour Calculator</h2>
        
        <div class="input-group">
            <label for="startTime">Start Time (e.g., 0700 or 1930)</label>
            <input type="text" id="startTime" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="formatAndCalculate(this)">
        </div>

        <div class="input-group">
            <label for="endTime">End Time (e.g., 1545 or 0415)</label>
            <input type="text" id="endTime" inputmode="numeric" maxlength="5" placeholder="00:00" oninput="formatAndCalculate(this)">
        </div>

        <div class="result-box">
            <div class="result-title">Total Elapsed Time</div>
            <div id="result" class="result-value">0h 0m</div>
        </div>
    </div>

    <script>
        function formatAndCalculate(input) {
            // Remove any non-numbers to clean up input
            let val = input.value.replace(/\D/g, '');
            
            // Auto-insert colon if they type 3 or 4 digits
            if (val.length > 2) {
                val = val.slice(0, 2) + ':' + val.slice(2, 4);
            }
            
            input.value = val; // Update the input field display
            
            // Trigger calculation
            calculateTime();
        }

        function calculateTime() {
            const startVal = document.getElementById('startTime').value;
            const endVal = document.getElementById('endTime').value;

            // Only calculate if both fields are fully filled out (HH:MM format = 5 characters)
            if (startVal.length < 5 || endVal.length < 5) return;

            const [startH, startM] = startVal.split(':').map(Number);
            const [endH, endM] = endVal.split(':').map(Number);

            // Sanity check for valid times
            if (startH > 23 || startM > 59 || endH > 23 || endM > 59) {
                document.getElementById('result').textContent = "Invalid Time";
                return;
            }

            let startTotalMinutes = (startH * 60) + startM;
            let endTotalMinutes = (endH * 60) + endM;

            // Midnight crossover logic (e.g., 22:00 to 06:00)
            if (endTotalMinutes < startTotalMinutes) {
                endTotalMinutes += 24 * 60;
            }

            const diffMinutes = endTotalMinutes - startTotalMinutes;
            const hours = Math.floor(diffMinutes / 60);
            const minutes = diffMinutes % 60;

            document.getElementById('result').textContent = `${hours}h ${minutes}m`;
        }
    </script>
</body>
</html>
