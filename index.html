<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24h Time Calc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Time Calc">
    
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --input-border: #48484a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
        }
        
        /* Logo styling container */
        .logo-container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            margin-bottom: 20px;
        }
        .company-logo {
            width: 180px; /* Adjust size as needed */
            height: auto;
            opacity: 0.9;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 600; font-size: 20px; margin-bottom: 24px; opacity: 0.9;}
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        .time-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .input-box-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-size: 11px;
            opacity: 0.5;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 20px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            text-align: center;
            font-weight: 600;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .result-box {
            margin-top: 10px;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid var(--input-border);
        }
        .result-title { font-size: 13px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .result-value { font-size: 32px; font-weight: 700; color: var(--accent-color); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Dsm-firmenich_logo.svg" alt="dsm-firmenich logo" class="company-logo">
    </div>

    <div class="app-container">
        <h2>24-Hour Calculator</h2>
        
        <div class="section-title">Start Time</div>
        <div class="time-row">
            <div class="input-box-wrapper">
                <label for="startH">Hours (00-23)</label>
                <input type="text" id="startH" inputmode="numeric" maxlength="2" placeholder="00" oninput="calculateTime()">
            </div>
            <div class="input-box-wrapper">
                <label for="startM">Minutes (00-59)</label>
                <input type="text" id="startM" inputmode="numeric" maxlength="2" placeholder="00" oninput="calculateTime()">
            </div>
        </div>

        <div class="section-title">End Time</div>
        <div class="time-row">
            <div class="input-box-wrapper">
                <label for="endH">Hours (00-23)</label>
                <input type="text" id="endH" inputmode="numeric" maxlength="2" placeholder="00" oninput="calculateTime()">
            </div>
            <div class="input-box-wrapper">
                <label for="endM">Minutes (00-59)</label>
                <input type="text" id="endM" inputmode="numeric" maxlength="2" placeholder="00" oninput="calculateTime()">
            </div>
        </div>

        <div class="result-box">
            <div class="result-title">Total Elapsed Time</div>
            <div id="result" class="result-value">0h 0m</div>
        </div>
    </div>

    <script>
        function calculateTime() {
            const shVal = document.getElementById('startH').value.replace(/\D/g, '');
            const smVal = document.getElementById('startM').value.replace(/\D/g, '');
            const ehVal = document.getElementById('endH').value.replace(/\D/g, '');
            const emVal = document.getElementById('endM').value.replace(/\D/g, '');

            document.getElementById('startH').value = shVal;
            document.getElementById('startM').value = smVal;
            document.getElementById('endH').value = ehVal;
            document.getElementById('endM').value = emVal;

            if (shVal === "" || smVal === "" || ehVal === "" || emVal === "") {
                document.getElementById('result').textContent = "0h 0m";
                return;
            }

            const startH = Number(shVal);
            const startM = Number(smVal);
            const endH = Number(ehVal);
            const endM = Number(emVal);

            if (startH > 23 || startM > 59 || endH > 23 || endM > 59) {
                document.getElementById('result').textContent = "Invalid Entry";
                return;
            }

            let startTotalMinutes = (startH * 60) + startM;
            let endTotalMinutes = (endH * 60) + endM;

            if (endTotalMinutes < startTotalMinutes) {
                endTotalMinutes += 24 * 60;
            }

            const diffMinutes = endTotalMinutes - startTotalMinutes;
            const hours = Math.floor(diffMinutes / 60);
            const minutes = diffMinutes % 60;

            document.getElementById('result').textContent = `${hours}h ${minutes}m`;
        }
    </script>
</body>
</html>
